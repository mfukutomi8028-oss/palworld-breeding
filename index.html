<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🥚 PAL 配合記録帳</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    input, textarea, button, select { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    .row-hover { transition: background 0.12s; }
    .row-hover:hover { background: #1e3a5a !important; }
    .icon-btn { transition: color 0.12s, background 0.12s; }
    .icon-btn:hover { background: rgba(255,255,255,0.07) !important; }
    .filter-btn { transition: all 0.12s; }
    .filter-btn:hover { opacity: 0.85; }
    .primary-btn { transition: opacity 0.12s, transform 0.08s; }
    .primary-btn:hover:not(:disabled) { opacity: 0.88; }
    .primary-btn:active:not(:disabled) { transform: scale(0.97); }
    .sec-btn { transition: background 0.12s, border-color 0.12s; }
    .sec-btn:hover { background: rgba(255,255,255,0.05) !important; }
    .status-badge { transition: opacity 0.12s; }
    .status-badge:hover { opacity: 0.8; }
    input:focus, textarea:focus { border-color: #2dd4bf !important; box-shadow: 0 0 0 2px rgba(45,212,191,0.15); outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;
    const STORAGE_KEY = 'palworld-breeding-v1';

    /* ── カラーパレット ── */
    const C = {
      bg:'#0f172a', card:'#1e293b', cardAlt:'#172033',
      border:'#334155',
      teal:'#2dd4bf', tealDark:'#0f766e', tealBg:'#042f2e',
      text:'#e2e8f0', muted:'#94a3b8', dim:'#64748b',
      green:'#4ade80', greenBg:'#052e16', greenBorder:'#166534',
      amber:'#fbbf24', amberBg:'#1c1400', amberBorder:'#92400e',
      red:'#f87171', redDark:'#7f1d1d',
    };

    /* ── SVGアイコン ── */
    const I = {
      plus:  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      search:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      edit:  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
      trash: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>,
      x:     <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      check: <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
      down:  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>,
      up:    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>,
      dl:    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
      ul:    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
    };

    /* ── 共通スタイルオブジェクト ── */
    const S = {
      card:    { background:C.card, border:`1px solid ${C.border}`, borderRadius:12 },
      btnPri:  { display:'flex', alignItems:'center', gap:6, padding:'8px 14px', background:C.tealDark, border:'none', borderRadius:8, fontSize:13, color:'#fff', fontWeight:600, cursor:'pointer' },
      btnSec:  { display:'flex', alignItems:'center', gap:6, padding:'8px 12px', background:'transparent', border:`1px solid ${C.border}`, borderRadius:8, fontSize:13, color:C.muted, cursor:'pointer' },
      btnDang: { display:'flex', alignItems:'center', gap:6, padding:'8px 14px', background:C.redDark, border:'none', borderRadius:8, fontSize:13, color:'#fff', fontWeight:600, cursor:'pointer' },
      inp:     { width:'100%', background:'#0a1120', border:`1px solid ${C.border}`, borderRadius:8, padding:'9px 12px', fontSize:14, color:C.text, outline:'none', boxSizing:'border-box' },
      lbl:     { display:'block', fontSize:11, fontWeight:600, color:C.muted, marginBottom:5, letterSpacing:'0.04em', textTransform:'uppercase' },
      th:      { padding:'10px 14px', fontSize:10, color:C.dim, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.08em', textAlign:'left', background:C.cardAlt, borderBottom:`1px solid ${C.border}`, whiteSpace:'nowrap' },
      td:      { padding:'10px 14px', fontSize:13, borderBottom:`1px solid ${C.border}`, color:C.text },
      iconBtn: { background:'none', border:'none', cursor:'pointer', padding:6, borderRadius:5, display:'flex', alignItems:'center', color:C.dim },
    };

    /* ══════════════════════════════════
       メインアプリ
    ══════════════════════════════════ */
    function App() {
      const [entries,  setEntries]  = useState([]);
      const [search,   setSearch]   = useState('');
      const [filter,   setFilter]   = useState('all');
      const [sortDesc, setSortDesc] = useState(true);
      const [view,     setView]     = useState('main'); // main|form|delete
      const [editing,  setEditing]  = useState(null);
      const [deleting, setDeleting] = useState(null);
      const [toast,    setToast]    = useState(null);
      const [form,     setForm]     = useState({ parent1:'', parent2:'', child:'', notes:'', confirmed:false, addedBy:'' });
      const fileRef = useRef(null);

      /* ── データ読み込み ── */
      useEffect(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) setEntries(JSON.parse(saved));
        } catch {}
      }, []);

      /* ── トースト通知 ── */
      const showToast = useCallback((msg, type='ok') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 2800);
      }, []);

      /* ── データ保存 ── */
      const persist = useCallback((next) => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
          setEntries(next);
        } catch { showToast('⚠️ 保存に失敗しました', 'err'); }
      }, [showToast]);

      /* ── フィルター & ソート ── */
      const shown = entries
        .filter(e => {
          const q = search.toLowerCase().trim();
          if (q && !`${e.parent1} ${e.parent2} ${e.child} ${e.notes||''}`.toLowerCase().includes(q)) return false;
          if (filter === 'confirmed'   && !e.confirmed) return false;
          if (filter === 'unconfirmed' &&  e.confirmed) return false;
          return true;
        })
        .sort((a,b) => sortDesc
          ? new Date(b.createdAt) - new Date(a.createdAt)
          : new Date(a.createdAt) - new Date(b.createdAt)
        );

      /* ── モーダル操作 ── */
      const openAdd    = () => { setEditing(null); setForm({parent1:'',parent2:'',child:'',notes:'',confirmed:false,addedBy:''}); setView('form'); };
      const openEdit   = (e) => { setEditing(e); setForm({parent1:e.parent1,parent2:e.parent2,child:e.child,notes:e.notes||'',confirmed:e.confirmed,addedBy:e.addedBy||''}); setView('form'); };
      const openDelete = (e) => { setDeleting(e); setView('delete'); };
      const closeModal = ()  => { setView('main'); setEditing(null); setDeleting(null); };

      /* ── フォーム送信 ── */
      const submitForm = () => {
        if (!form.parent1.trim() || !form.parent2.trim() || !form.child.trim()) return;
        const now  = new Date().toISOString();
        const next = editing
          ? entries.map(e => e.id === editing.id ? {...form, id:e.id, createdAt:e.createdAt, updatedAt:now} : e)
          : [...entries, {...form, id:`${Date.now()}-${Math.random().toString(36).slice(2,6)}`, createdAt:now}];
        persist(next);
        closeModal();
        showToast(editing ? '✏️ 更新しました！' : '✅ 追加しました！');
      };

      /* ── 削除 ── */
      const doDelete = () => {
        persist(entries.filter(e => e.id !== deleting.id));
        closeModal();
        showToast('🗑️ 削除しました');
      };

      /* ── 確認状態トグル ── */
      const toggleOK = (e) => {
        persist(entries.map(x => x.id === e.id ? {...x, confirmed:!x.confirmed} : x));
        showToast(e.confirmed ? '⚠️ 未確認に戻しました' : '✅ 確認済みにしました！');
      };

      /* ── CSV書き出し ── */
      const exportCSV = () => {
        const BOM  = '\uFEFF';
        const rows = [
          ['親パル1','親パル2','子パル','メモ','確認状態','追加者','追加日'],
          ...entries.map(e => [
            e.parent1, e.parent2, e.child,
            `"${(e.notes||'').replace(/"/g,'""')}"`,
            e.confirmed ? '確認済み' : '未確認',
            e.addedBy || '',
            new Date(e.createdAt).toLocaleDateString('ja-JP')
          ])
        ];
        const blob = new Blob([BOM + rows.map(r=>r.join(',')).join('\n')], {type:'text/csv;charset=utf-8;'});
        const url  = URL.createObjectURL(blob);
        const a    = Object.assign(document.createElement('a'), {href:url, download:'palworld_breeding.csv'});
        a.click(); URL.revokeObjectURL(url);
        showToast('📊 CSVを書き出しました！');
      };

      /* ── JSONデータ書き出し（友達共有用）── */
      const exportJSON = () => {
        const blob = new Blob([JSON.stringify(entries, null, 2)], {type:'application/json'});
        const url  = URL.createObjectURL(blob);
        const a    = Object.assign(document.createElement('a'), {href:url, download:'palworld_data.json'});
        a.click(); URL.revokeObjectURL(url);
        showToast('📤 データを書き出しました！友達に送ってね');
      };

      /* ── JSONデータ取り込み（友達から受け取り）── */
      const handleImport = (ev) => {
        const file = ev.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const imported = JSON.parse(e.target.result);
            if (!Array.isArray(imported)) { showToast('⚠️ 無効なファイルです', 'err'); return; }
            const existIds  = new Set(entries.map(x => x.id));
            const newItems  = imported.filter(x => !existIds.has(x.id));
            persist([...entries, ...newItems]);
            showToast(`🎉 ${newItems.length}件の新しい記録を取り込みました！`);
          } catch { showToast('⚠️ 読み込みに失敗しました', 'err'); }
        };
        reader.readAsText(file);
        ev.target.value = '';
      };

      const isValid    = form.parent1.trim() && form.parent2.trim() && form.child.trim();
      const confirmedN = entries.filter(e => e.confirmed).length;

      /* ════════════════════════════
         フォームモーダル
      ════════════════════════════ */
      if (view === 'form') return (
        <div style={{minHeight:'100vh', background:'rgba(9,15,30,0.96)', display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
          <div style={{...S.card, width:'100%', maxWidth:450, boxShadow:'0 30px 70px rgba(0,0,0,0.7)'}}>
            <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'18px 20px', borderBottom:`1px solid ${C.border}`}}>
              <span style={{fontWeight:700, fontSize:15}}>{editing ? '✏️ 配合を編集' : '➕ 新しい配合を追加'}</span>
              <button style={S.iconBtn} className="icon-btn" onClick={closeModal}>{I.x}</button>
            </div>
            <div style={{padding:20, display:'flex', flexDirection:'column', gap:14}}>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
                <div>
                  <label style={S.lbl}>親パル 1 <span style={{color:C.red}}>*</span></label>
                  <input style={S.inp} placeholder="例: ランタン" value={form.parent1}
                    onChange={e => setForm(f => ({...f, parent1:e.target.value}))} autoFocus/>
                </div>
                <div>
                  <label style={S.lbl}>親パル 2 <span style={{color:C.red}}>*</span></label>
                  <input style={S.inp} placeholder="例: ダチパル" value={form.parent2}
                    onChange={e => setForm(f => ({...f, parent2:e.target.value}))}/>
                </div>
              </div>
              <div>
                <label style={S.lbl}>子パル <span style={{color:C.red}}>*</span></label>
                <input style={S.inp} placeholder="例: ネコパル" value={form.child}
                  onChange={e => setForm(f => ({...f, child:e.target.value}))}/>
              </div>
              <div>
                <label style={S.lbl}>メモ</label>
                <textarea style={{...S.inp, minHeight:68, resize:'vertical', lineHeight:1.6}}
                  placeholder="特技・特性・確率・気になった点など…"
                  value={form.notes} onChange={e => setForm(f => ({...f, notes:e.target.value}))}/>
              </div>
              <div>
                <label style={S.lbl}>追加者</label>
                <input style={S.inp} placeholder="あなたのニックネーム（例: ふくとみ）" value={form.addedBy}
                  onChange={e => setForm(f => ({...f, addedBy:e.target.value}))}/>
              </div>
              <div style={{display:'flex', alignItems:'center', gap:10, cursor:'pointer', userSelect:'none', padding:'2px 0'}}
                onClick={() => setForm(f => ({...f, confirmed:!f.confirmed}))}>
                <div style={{width:18, height:18, borderRadius:4, flexShrink:0, border:`2px solid ${form.confirmed?C.teal:C.border}`, background:form.confirmed?C.teal:'transparent', display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.15s'}}>
                  {form.confirmed && I.check}
                </div>
                <span style={{fontSize:13, color:C.muted}}>実際に配合して結果を確認した</span>
              </div>
            </div>
            <div style={{display:'flex', gap:8, justifyContent:'flex-end', padding:'14px 20px', borderTop:`1px solid ${C.border}`}}>
              <button style={S.btnSec} className="sec-btn" onClick={closeModal}>キャンセル</button>
              <button style={{...S.btnPri, opacity:isValid?1:0.38, cursor:isValid?'pointer':'not-allowed'}}
                className="primary-btn" onClick={submitForm} disabled={!isValid}>
                {I.check} {editing ? '更新する' : '追加する'}
              </button>
            </div>
          </div>
        </div>
      );

      /* ════════════════════════════
         削除確認モーダル
      ════════════════════════════ */
      if (view === 'delete' && deleting) return (
        <div style={{minHeight:'100vh', background:'rgba(9,15,30,0.96)', display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
          <div style={{...S.card, width:'100%', maxWidth:340, padding:'30px 24px', textAlign:'center'}}>
            <div style={{fontSize:42, marginBottom:14}}>🗑️</div>
            <div style={{fontWeight:700, fontSize:15, marginBottom:10}}>本当に削除しますか？</div>
            <div style={{fontSize:13, color:C.muted, marginBottom:4}}>
              <span style={{color:C.teal, fontWeight:600}}>{deleting.parent1} × {deleting.parent2}</span>
              <span style={{color:C.dim}}> → </span>
              <span style={{color:C.teal, fontWeight:700}}>{deleting.child}</span>
            </div>
            <div style={{fontSize:12, color:C.dim, marginBottom:24}}>この操作は元に戻せません。</div>
            <div style={{display:'flex', gap:10, justifyContent:'center'}}>
              <button style={S.btnSec} className="sec-btn" onClick={closeModal}>キャンセル</button>
              <button style={S.btnDang} className="primary-btn" onClick={doDelete}>{I.trash} 削除する</button>
            </div>
          </div>
        </div>
      );

      /* ════════════════════════════
         メイン画面
      ════════════════════════════ */
      return (
        <div style={{minHeight:'100vh', background:C.bg}}>

          {/* トースト通知 */}
          {toast && (
            <div style={{position:'fixed', top:18, right:18, background:toast.type==='err'?'#7f1d1d':C.tealDark, color:'#fff', padding:'10px 18px', borderRadius:9, fontSize:13, fontWeight:500, zIndex:9999, boxShadow:'0 6px 24px rgba(0,0,0,0.45)', border:`1px solid ${toast.type==='err'?C.red:C.teal}`, maxWidth:340}}>
              {toast.msg}
            </div>
          )}

          {/* 隠しファイル入力 */}
          <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={handleImport}/>

          {/* ヘッダー */}
          <div style={{background:C.card, borderBottom:`1px solid ${C.border}`, padding:'13px 24px', position:'sticky', top:0, zIndex:200}}>
            <div style={{maxWidth:1050, margin:'0 auto', display:'flex', alignItems:'center', justifyContent:'space-between', gap:12, flexWrap:'wrap'}}>
              <div>
                <div style={{fontSize:19, fontWeight:800, color:C.teal, letterSpacing:-0.5}}>🥚 PAL 配合記録帳</div>
                <div style={{fontSize:11, color:C.dim, marginTop:1}}>Palworld Breeding Tracker — みんなで記録・共有</div>
              </div>
              <div style={{display:'flex', gap:7, flexWrap:'wrap', alignItems:'center'}}>
                <button style={S.btnSec} className="sec-btn" onClick={() => fileRef.current.click()} title="友達のJSONデータを取り込む">
                  {I.ul} データ取り込み
                </button>
                <button style={S.btnSec} className="sec-btn" onClick={exportJSON} title="データをJSONファイルに書き出し、友達に共有する">
                  {I.dl} データ共有
                </button>
                <button style={S.btnSec} className="sec-btn" onClick={exportCSV}>
                  {I.dl} CSV出力
                </button>
                <button style={S.btnPri} className="primary-btn" onClick={openAdd}>
                  {I.plus} 配合を追加
                </button>
              </div>
            </div>
          </div>

          <div style={{maxWidth:1050, margin:'0 auto', padding:'22px 24px 64px'}}>

            {/* 統計カード */}
            <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12, marginBottom:22}}>
              {[
                ['📋 総記録数', entries.length, C.teal],
                ['✅ 確認済み', confirmedN, C.green],
                ['⚠️ 未確認',  entries.length - confirmedN, C.amber],
              ].map(([label, n, color]) => (
                <div key={label} style={{...S.card, padding:'13px 18px'}}>
                  <div style={{fontSize:10, color:C.dim, marginBottom:4, letterSpacing:'0.05em', textTransform:'uppercase'}}>{label}</div>
                  <div style={{fontSize:28, fontWeight:800, color}}>
                    {n} <span style={{fontSize:13, fontWeight:400, color:C.dim}}>件</span>
                  </div>
                </div>
              ))}
            </div>

            {/* ツールバー */}
            <div style={{display:'flex', gap:8, marginBottom:10, flexWrap:'wrap'}}>
              <div style={{position:'relative', flex:1, minWidth:200}}>
                <span style={{position:'absolute', left:11, top:'50%', transform:'translateY(-50%)', color:C.dim, pointerEvents:'none', lineHeight:0}}>
                  {I.search}
                </span>
                <input style={{...S.inp, paddingLeft:34}} placeholder="パル名・メモで検索…"
                  value={search} onChange={e => setSearch(e.target.value)}/>
              </div>
              <div style={{display:'flex', gap:6}}>
                {[
                  ['all',          'すべて'],
                  ['confirmed',    '✅ 確認済み'],
                  ['unconfirmed',  '⚠️ 未確認'],
                ].map(([v, l]) => (
                  <button key={v} className="filter-btn" onClick={() => setFilter(v)} style={{
                    padding:'8px 12px', borderRadius:8, fontSize:12, cursor:'pointer',
                    border:`1px solid ${filter===v ? C.teal : C.border}`,
                    background: filter===v ? C.tealBg : 'transparent',
                    color:      filter===v ? C.teal   : C.muted,
                    fontWeight: filter===v ? 700 : 400,
                  }}>{l}</button>
                ))}
              </div>
              <button style={S.btnSec} className="sec-btn" onClick={() => setSortDesc(d => !d)}>
                {sortDesc ? I.down : I.up} {sortDesc ? '新しい順' : '古い順'}
              </button>
            </div>

            <div style={{fontSize:12, color:C.dim, marginBottom:12}}>
              {shown.length} 件表示{search && ` — 「${search}」`}
              {entries.length > 0 && ` / 合計 ${entries.length} 件`}
            </div>

            {/* テーブル / 空状態 */}
            {shown.length === 0 ? (
              <div style={{...S.card, padding:'64px 24px', textAlign:'center'}}>
                <div style={{fontSize:54, marginBottom:14}}>🥚</div>
                <div style={{color:C.muted, fontSize:14, lineHeight:1.8}}>
                  {entries.length === 0
                    ? <>まだ配合記録がありません。<br/>「配合を追加」ボタンから最初の発見を記録しよう！</>
                    : '検索・フィルター条件に一致する記録がありませんでした。'}
                </div>
              </div>
            ) : (
              <div style={{...S.card, overflow:'hidden'}}>
                <div style={{overflowX:'auto'}}>
                  <table style={{width:'100%', borderCollapse:'collapse', minWidth:680}}>
                    <thead>
                      <tr>
                        {['親パル 1','親パル 2','','子パル','メモ','状態','追加者','日付',''].map((h,i) => (
                          <th key={i} style={{...S.th, textAlign:i===2?'center':'left'}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {shown.map((e, i) => (
                        <tr key={e.id} className="row-hover"
                          style={{background: i%2===1 ? '#172033' : 'transparent'}}>
                          <td style={{...S.td, fontWeight:500}}>{e.parent1}</td>
                          <td style={{...S.td, fontWeight:500}}>{e.parent2}</td>
                          <td style={{...S.td, textAlign:'center', color:C.dim, fontSize:16}}>＋</td>
                          <td style={{...S.td, color:C.teal, fontWeight:700}}>{e.child}</td>
                          <td style={{...S.td, fontSize:12, color:C.muted, maxWidth:160}}>
                            <span style={{display:'block', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}} title={e.notes}>
                              {e.notes || '—'}
                            </span>
                          </td>
                          <td style={{...S.td, textAlign:'center'}}>
                            <button className="status-badge" onClick={() => toggleOK(e)} style={{
                              display:'inline-flex', alignItems:'center', gap:4,
                              padding:'3px 10px', borderRadius:999, fontSize:11, fontWeight:700, cursor:'pointer',
                              background: e.confirmed ? C.greenBg   : C.amberBg,
                              color:      e.confirmed ? C.green     : C.amber,
                              border:`1px solid ${e.confirmed ? C.greenBorder : C.amberBorder}`,
                            }}>
                              {e.confirmed && I.check}
                              {e.confirmed ? '確認済' : '未確認'}
                            </button>
                          </td>
                          <td style={{...S.td, fontSize:12, color:C.dim}}>{e.addedBy || '—'}</td>
                          <td style={{...S.td, fontSize:11, color:C.dim, whiteSpace:'nowrap'}}>
                            {new Date(e.createdAt).toLocaleDateString('ja-JP')}
                          </td>
                          <td style={S.td}>
                            <div style={{display:'flex', gap:2}}>
                              <button style={S.iconBtn} className="icon-btn" onClick={() => openEdit(e)} title="編集"
                                onMouseEnter={ev => ev.currentTarget.style.color=C.teal}
                                onMouseLeave={ev => ev.currentTarget.style.color=C.dim}>
                                {I.edit}
                              </button>
                              <button style={S.iconBtn} className="icon-btn" onClick={() => openDelete(e)} title="削除"
                                onMouseEnter={ev => ev.currentTarget.style.color=C.red}
                                onMouseLeave={ev => ev.currentTarget.style.color=C.dim}>
                                {I.trash}
                              </button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* フッターヒント */}
            <div style={{marginTop:18, padding:'12px 16px', background:C.card, border:`1px solid ${C.border}`, borderRadius:9, fontSize:12, color:C.dim, lineHeight:1.7}}>
              💡 <span style={{color:C.muted, fontWeight:600}}>友達とのデータ共有方法：</span>
              「データ共有」でJSONファイルを書き出し → Discordなどで友達に送る → 友達は「データ取り込み」で読み込む。重複は自動でスキップされます！
            </div>
          </div>
        </div>
      );
    }

    /* ── レンダリング ── */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
