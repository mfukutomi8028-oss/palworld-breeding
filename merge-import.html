<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>配合記録インポート</title>
  <script src="config.js" defer></script>
  <style>
    :root { --ink:#17304a; --muted:#667c91; --line:rgba(24,62,95,.16); --yellow:#ffc740; --green:#36bd62; --bg:#eef7ff; --red:#d84b55; }
    body { margin:0; min-height:100vh; font-family:"Segoe UI","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:linear-gradient(140deg,#e6f6ff,#fff7e7); display:grid; place-items:center; padding:24px; }
    main { width:min(900px,100%); background:rgba(255,255,255,.94); border:1px solid var(--line); border-radius:24px; box-shadow:0 22px 60px rgba(27,77,113,.18); padding:28px; }
    h1 { margin:0 0 8px; font-size:28px; }
    p { line-height:1.7; }
    .box { border:1px solid var(--line); border-radius:16px; padding:16px; background:#f8fbff; margin:16px 0; }
    label { display:block; font-weight:900; margin-bottom:8px; }
    input { width:100%; padding:13px 14px; border:1px solid var(--line); border-radius:14px; font:inherit; }
    button { border:0; border-radius:14px; padding:13px 18px; font-weight:900; cursor:pointer; }
    .primary { color:#5b3d00; background:linear-gradient(135deg,#ffe166,#ffb737); }
    .danger { color:#fff; background:linear-gradient(135deg,#ef6a72,#c93d4a); }
    .secondary { background:#fff; border:1px solid var(--line); color:var(--ink); }
    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
    .status { margin-top:16px; padding:14px; border-radius:14px; background:#f7fbff; border:1px solid var(--line); white-space:pre-wrap; }
    .ok { background:#edfff3; color:#237942; border-color:rgba(35,121,66,.2); }
    .warn { background:#fff7e2; color:#8b6100; border-color:rgba(139,97,0,.2); }
    .danger-note { background:#fff2f3; color:#8f2530; border-color:rgba(216,75,85,.25); }
    code { background:#eef4fb; padding:2px 5px; border-radius:6px; }
    .summary { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:16px 0; }
    .summary div { padding:14px; border:1px solid var(--line); border-radius:14px; background:#fff; }
    .summary strong { display:block; font-size:24px; }
    @media (max-width: 680px) { .summary { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<main>
  <h1>配合記録インポート</h1>
  <p>スプレッドシートの配合記録をFirebaseへ登録します。記録者は <strong>森井</strong>、メモは空欄です。</p>

  <div class="summary">
    <div><span>総件数</span><strong>65件</strong></div>
    <div><span>配合確認済み</span><strong>57件</strong></div>
    <div><span>確認中</span><strong>8件</strong></div>
  </div>

  <div class="box">
    <label for="roomId">インポート先 room ID</label>
    <input id="roomId" placeholder="例：room-xxxxxxx" />
    <p style="color:var(--muted); margin-bottom:0;">通常はサイトURLの <code>#room=...</code> の値が自動入力されます。空の場合は、配合記録ボードのURLからコピーしてください。</p>
  </div>

  <div class="box danger-note">
    <strong>既存データを完全に入れ替えたい場合</strong>
    <p style="margin-bottom:0;">「全削除してからインポート」を使うと、指定roomの既存recordsを削除してから今回の全65件を登録します。通常は「追加/上書き」で十分です。</p>
  </div>

  <div class="actions">
    <button class="primary" id="importBtn" type="button">追加/上書きインポート</button>
    <button class="danger" id="replaceBtn" type="button">全削除してからインポート</button>
    <button class="secondary" id="copyBtn" type="button">room IDをURLから再取得</button>
  </div>

  <div id="status" class="status">準備中...</div>
</main>

const $ = (id) => document.getElementById(id);
const statusEl = $("status");

function getRoomFromLocation() {
  const params = new URLSearchParams(location.hash.replace(/^#/, ""));
  return params.get("room") || localStorage.getItem("palBoardRoomId") || "";
}

function setStatus(message, kind = "") {
  statusEl.textContent = message;
  statusEl.className = `status ${kind}`;
}

function fillRoom() {
  $("roomId").value = getRoomFromLocation();
}

async function getFirebase(roomId) {
  if (!window.firebaseConfig?.apiKey || !window.firebaseConfig?.databaseURL) {
    throw new Error("config.js の Firebase設定が読み込めません。merge-import.html を index.html と同じ階層に置いてください。");
  }
  const appMod = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js");
  const dbMod = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js");
  const app = appMod.initializeApp(window.firebaseConfig);
  const db = dbMod.getDatabase(app);
  return { dbMod, db, recordsRef: dbMod.ref(db, `rooms/${roomId}/records`) };
}

async function runImport(mode) {
  const roomId = $("roomId").value.trim().replace(/[^a-zA-Z0-9_-]/g, "");
  if (!roomId) {
    setStatus("room IDが空です。配合記録ボードのURL末尾にある #room=... の値を入力してください。", "warn");
    return;
  }

  if (mode === "replace") {
    const ok = confirm(`rooms/${roomId}/records を全削除してから、今回の${Object.keys(IMPORT_RECORDS).length}件を登録します。よろしいですか？`);
    if (!ok) return;
  }

  try {
    setStatus("Firebaseへ接続中...");
    const { dbMod, recordsRef } = await getFirebase(roomId);

    if (mode === "replace") {
      setStatus("既存recordsを削除中...");
      await dbMod.remove(recordsRef);
      setStatus("新しいrecordsを登録中...");
      await dbMod.set(recordsRef, IMPORT_RECORDS);
    } else {
      setStatus("recordsへ追加/上書き中...");
      await dbMod.update(recordsRef, IMPORT_RECORDS);
    }

    setStatus(`インポート完了：${Object.keys(IMPORT_RECORDS).length}件を rooms/${roomId}/records へ登録しました。\n\n配合記録ボードを開き、Ctrl + F5 で更新してください。`, "ok");
  } catch (error) {
    console.error(error);
    setStatus(`インポート失敗：${error.message}\n\nFirebaseのルール、config.js、room IDを確認してください。`, "warn");
  }
}

fillRoom();

$("copyBtn").addEventListener("click", () => {
  fillRoom();
  setStatus("URLまたはブラウザ保存値からroom IDを再取得しました。", "warn");
});

$("importBtn").addEventListener("click", () => runImport("merge"));
$("replaceBtn").addEventListener("click", () => runImport("replace"));
</script>
