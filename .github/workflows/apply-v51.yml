name: Apply Palworld v51 convenience update

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  apply-update:
    if: github.event.issue.title == 'trigger-v51-convenience-update-3'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply verified v51 patch
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .github/v51.patch.gz.b64 | gzip -d > /tmp/v51.patch
          git apply /tmp/v51.patch
          node --check app.js
          grep -q 'app.js?v=51' index.html
          grep -q 'id="newPalOnly"' index.html
          grep -q 'id="mutationEgg"' index.html
          grep -q 'function applyRelatedPalFilter' app.js
          grep -q 'try { verifyBuiltInReleaseData(); } catch' app.js
          rm -f .github/workflows/apply-v51.yml .github/v51.patch.gz.b64
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add Palworld 1.0 convenience features (v51)'
          git push origin main
