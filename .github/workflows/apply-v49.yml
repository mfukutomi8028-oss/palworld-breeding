name: Apply Palworld 1.0 v49 update

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  diagnose-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Diagnose validated v49 patch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          cat .github/v49-patch/part-* > /tmp/palworld-v49.patch.b64
          base64 --decode /tmp/palworld-v49.patch.b64 > /tmp/palworld-v49.patch
          {
            echo '```text'
            echo "base64_sha=$(sha256sum /tmp/palworld-v49.patch.b64 | cut -d' ' -f1)"
            echo "patch_sha=$(sha256sum /tmp/palworld-v49.patch | cut -d' ' -f1)"
            echo "expected_patch_sha=ed8a938d3a429e0c5b5a44f618f7558f19c17605330f776fb422b5ecdc9f55c7"
            echo "app_blob=$(git hash-object app.js)"
            echo "index_blob=$(git hash-object index.html)"
            echo "style_blob=$(git hash-object style.css)"
            echo "readme_blob=$(git hash-object README.md)"
            echo "--- patch dry run ---"
            patch --dry-run -p1 --forward < /tmp/palworld-v49.patch 2>&1
            echo "patch_exit=$?"
            echo '```'
          } > /tmp/v49-diagnostic.md
          gh issue comment 1 --repo "${{ github.repository }}" --body-file /tmp/v49-diagnostic.md
