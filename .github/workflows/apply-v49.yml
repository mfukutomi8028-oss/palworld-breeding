name: Apply Palworld 1.0 v49 update

on:
  push:
    paths:
      - .github/workflows/apply-v49.yml

permissions:
  contents: write

jobs:
  apply-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply validated v49 patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/v49-patch/part-* > /tmp/palworld-v49.patch.b64
          base64 --decode /tmp/palworld-v49.patch.b64 > /tmp/palworld-v49.patch
          patch -p1 --forward < /tmp/palworld-v49.patch
          rm -rf .github/v49-patch
          rm -f .github/workflows/apply-v49.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js index.html style.css README.md .github
          git commit -m "Update Palworld roster for 1.0 (v49)"
          git push
