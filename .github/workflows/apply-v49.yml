name: Apply Palworld 1.0 v49 update

on:
  push:
    paths:
      - .github/workflows/apply-v49.yml
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  apply-update:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event.issue.title == 'apply-v49-update'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply validated v49 patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/v49-patch/part-* > /tmp/palworld-v49.patch.b64
          base64 --decode /tmp/palworld-v49.patch.b64 > /tmp/palworld-v49.patch
          test "$(sha256sum /tmp/palworld-v49.patch | cut -d' ' -f1)" = "ed8a938d3a429e0c5b5a44f618f7558f19c17605330f776fb422b5ecdc9f55c7"
          patch -p1 --forward < /tmp/palworld-v49.patch
          rm -rf .github/v49-patch

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js index.html style.css README.md .github/v49-patch
          git commit -m "Update Palworld roster for 1.0 (v49)"
          git push origin main
