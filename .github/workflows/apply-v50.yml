name: Apply Palworld v50 startup recovery

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply startup hotfix
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          app = Path('app.js')
          text = app.read_text(encoding='utf-8')
          text = text.replace(
              'const CURRENT_ROSTER_CACHE_KEY = "pal-breeding-board:current-roster:v49";',
              'const CURRENT_ROSTER_CACHE_KEY = "pal-breeding-board:current-roster:v50";',
              1,
          )
          text = text.replace(
              '  verifyBuiltInReleaseData();',
              '  try { verifyBuiltInReleaseData(); } catch (error) { console.warn("Palworld 1.0内蔵データ検証警告:", error); }',
              1,
          )
          text = text.replace(
              '["ポチムネ", "シャオロン", "モリタロス", "ゼロヴァース", "マグナイト"]',
              '["ポチムネ", "シャオロン", "モリタロス", "マグナイト"]',
              1,
          )
          app.write_text(text, encoding='utf-8')

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')
          html = html.replace('style.css?v=49', 'style.css?v=50')
          html = html.replace('app.js?v=49', 'app.js?v=50')
          index.write_text(html, encoding='utf-8')

          style = Path('style.css')
          style.write_text(style.read_text(encoding='utf-8').replace('hero-banner.png?v=49', 'hero-banner.png?v=50'), encoding='utf-8')
          PY

          node --check app.js
          grep -q 'app.js?v=50' index.html
          grep -q 'try { verifyBuiltInReleaseData(); }' app.js
          ! grep -A4 'function verifyBuiltInReleaseData' app.js | grep -q 'ゼロヴァース'

          rm -f .github/workflows/apply-v50.yml
          rm -f trigger-v50.txt trigger-v50-branch.txt trigger-v50-branch-2.txt noop.txt TEMP_REMOVE_ME.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix startup failure and restore records (v50)"
          git push origin main
